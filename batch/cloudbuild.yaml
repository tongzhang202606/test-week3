steps:
  # 1. Batchイメージビルド（完全backend同じ構文・相対パス）
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Batch Image'
    args: [
      'build', 
      '-t', 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/batch-image:latest', 
      './batch'
    ]

  # 2. イメージPush
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Batch Image'
    args: [
      'push', 
      'asia-northeast1-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/batch-image:latest'
    ]

images:
  - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/batch-image:latest'

options:
  logging: CLOUD_LOGGING_ONLY
