steps:
  # 1. Batchイメージビルド（batchディレクトリ固定、backendと同じ書き方）
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Batch Image'
    args: [
      'build', 
      '-t', 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/batch-image:latest', 
      './batch'
    ]

  # 2. Artifact RegistryにイメージPush
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Batch Image'
    args: [
      'push', 
      'asia-northeast1-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/batch-image:latest'
    ]

# 保存イメージ登録
images:
  - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/batch-image:latest'

# 新版GCP必須ログ設定（backendと完全統一）
options:
  logging: CLOUD_LOGGING_ONLY
